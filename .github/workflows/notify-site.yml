name: Notify Site Repo
on:
  push:
    branches: [main]
    paths:
      - 'architectures/**'
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SITE_REPO_TOKEN }}
          repository: tedahn/open-agent-harness-page
          event-type: content-updated
